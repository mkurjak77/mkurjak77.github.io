<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Your Book Title</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--text:#c8c4bc;--text-dim:#6e6b65;--text-bright:#e8e4dc;--accent:#a08060;--border:#1e1e1c}
    html,body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:19px;line-height:1.8;min-height:100vh}
    body{padding:env(safe-area-inset-top) 20px 0}
    header{text-align:center;padding:80px 20px 60px;border-bottom:1px solid var(--border)}
    .book-label{font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
    h1{font-weight:300;font-size:clamp(32px,7vw,64px);color:var(--text-bright);line-height:1.1}
    .subtitle{font-style:italic;font-size:18px;color:var(--text-dim);margin-top:14px}
    .toc-label{font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-dim);text-align:center;padding:40px 0 20px}
    .chapters{max-width:700px;margin:0 auto;padding-bottom:100px}
    details{border-bottom:1px solid var(--border)}
    summary{display:flex;align-items:baseline;gap:15px;padding:20px 5px;cursor:pointer;list-style:none}
    .chapter-num{font-family:'Tenor Sans',sans-serif;font-size:11px;color:var(--text-dim);min-width:30px}
    .chapter-title{font-size:20px;flex:1}
    .chapter-arrow{font-size:12px;color:var(--text-dim)}
    details[open] summary .chapter-title{color:var(--text-bright)}
    details[open] .chapter-arrow{transform:rotate(90deg);color:var(--accent)}
    .chapter-body{padding:10px 5px 30px 45px;animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    footer{text-align:center;padding:40px;font-family:'Tenor Sans',sans-serif;font-size:9px;color:var(--text-dim);border-top:1px solid var(--border)}
  </style>
</head>
<body>
<header>
  <p class="book-label">A Novel</p>
  <h1>Your Book Title</h1>
  <p class="subtitle">By Your Name</p>
</header>
<p class="toc-label">Contents</p>
<main class="chapters">
  <details>
    <summary>
      <span class="chapter-num">I</span>
      <span class="chapter-title">Chapter One</span>
      <span class="chapter-arrow">›</span>
    </summary>
    <div class="chapter-body">
      <p>This is your text. If this shows up on a black background, it's working!</p>
    </div>
  </details>
  </main>
<footer>&copy; 2026 Your Name</footer>
</body>
</html>
