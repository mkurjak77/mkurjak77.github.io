<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Tenor+Sans&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #080808;
      --text: #c8c4bc;
      --accent: #a08060;
      --border: rgba(255, 255, 255, 0.1);
      --panel: rgba(25, 25, 25, 0.9);
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 21px;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      position: fixed;
      top: env(safe-area-inset-top, 10px);
      left: 0;
      right: 0;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .nav-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: transparent;
      width: 44px;
      height: 38px;
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    .nav-btn:active { background: var(--accent); }

    .selector-wrapper {
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 65px;
      height: 38px;
    }

    .selector-wrapper.font-size-selector {
      width: 60px;
    }

    .selector-wrapper select {
      background: transparent;
      border: none;
      color: var(--accent);
      font-family: 'Tenor Sans', sans-serif;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      height: 100%;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      text-align: center;
      padding: 0;
    }

    /* font-size: 16px on options prevents iOS from auto-zooming the page on tap */
    .selector-wrapper select option {
      background: #1a1a1a;
      color: var(--text);
      font-size: 16px;
    }

    #reader-view {
      flex: 1;
      overflow-y: auto;
      padding: calc(env(safe-area-inset-top) + 75px) 25px 80px;
      display: flex;
      justify-content: center;
      scroll-behavior: smooth;
    }

    #content-container {
      max-width: 650px;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }

    p { margin-bottom: 1.5em; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #reader-view::-webkit-scrollbar { display: none; }
    #reader-view { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="btn-group">
    <button class="nav-btn" onclick="prev()" aria-label="Previous"></button>
    <button class="nav-btn" onclick="next()" aria-label="Next"></button>
  </div>

  <div class="btn-group">
    <div class="selector-wrapper font-size-selector">
      <select id="font-size-select" onchange="setFontSize(this.value)" aria-label="Font size">
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="21" selected>21</option>
        <option value="24">24</option>
        <option value="28">28</option>
      </select>
    </div>

    <div class="selector-wrapper">
      <select id="page-select" onchange="jumpToPage(this.value)" aria-label="Page number"></select>
    </div>
  </div>
</div>

<main id="reader-view">
  <div id="content-container"></div>
</main>

<script>
  let pages = [];
  let currentIndex = 0;

  function setFontSize(size) {
    document.body.style.fontSize = size + 'px';
  }

  async function loadBook() {
    try {
      const response = await fetch('book.txt');
      if (!response.ok) throw new Error('Could not load book.txt');
      const fullBookText = await response.text();
      paginate(fullBookText);
    } catch (err) {
      document.getElementById('content-container').innerHTML =
        '<p style="color:#a08060;">Error: could not load book.txt — make sure it is in the same folder as index.html.</p>';
      console.error(err);
    }
  }

  function paginate(fullBookText) {
    pages = [];
    const totalChars = fullBookText.length;
    const chunkTarget = Math.ceil(totalChars / 100);
    let start = 0;

    while (start < totalChars) {
      let end = start + chunkTarget;

      if (end < totalChars) {
        const searchRange = fullBookText.slice(end, end + 1000);
        const match = searchRange.match(/[.!?]/);

        if (match) {
          end = end + match.index + 1;
        } else {
          const nextSpace = fullBookText.indexOf(' ', end);
          if (nextSpace !== -1) end = nextSpace;
        }
      }

      pages.push(fullBookText.slice(start, end).trim());
      start = end;
    }

    setupDropdown();
    loadFromHash();
  }

  function setupDropdown() {
    const select = document.getElementById('page-select');
    select.innerHTML = '';
    pages.forEach((_, index) => {
      const opt = document.createElement('option');
      opt.value = index;
      opt.textContent = index + 1;
      select.appendChild(opt);
    });
  }

  function loadFromHash() {
    const hash = window.location.hash.replace('#', '');
    const pageNum = parseInt(hash);
    if (!isNaN(pageNum) && pageNum > 0 && pageNum <= pages.length) {
      currentIndex = pageNum - 1;
    } else {
      currentIndex = 0;
    }
    render();
  }

  function render() {
    const container = document.getElementById('content-container');
    const select = document.getElementById('page-select');
    
    container.innerHTML = pages[currentIndex]
      .split(/\n\s*\n/) 
      .filter(p => p.trim() !== '')
      .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
      .join('');

    select.value = currentIndex;
    document.getElementById('reader-view').scrollTop = 0;
    window.history.replaceState(null, null, `#${currentIndex + 1}`);
  }

  function jumpToPage(val) {
    currentIndex = parseInt(val);
    render();
  }

  function next() { if (currentIndex < pages.length - 1) { currentIndex++; render(); } }
  function prev() { if (currentIndex > 0) { currentIndex--; render(); } }

  document.addEventListener('keydown', e => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
  });

  window.addEventListener('hashchange', loadFromHash);

  loadBook();
</script>

</body>
</html>
