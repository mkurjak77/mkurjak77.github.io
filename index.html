<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Your Book Title</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Tenor+Sans&display=swap" rel="stylesheet">
  
  <script>
    /* PASTE YOUR CHAPTER TEXT BETWEEN THE QUOTES BELOW */
    const bookTitle = "Your Book Title";
    const authorName = "Your Name";

    const chapters = [
      "Paste Chapter 1 text here. You can use multiple lines.",
      "Paste Chapter 2 text here.",
      "Paste Chapter 3 text here.",
      "Paste Chapter 4 text here.",
      "Paste Chapter 5 text here.",
      "Paste Chapter 6 text here.",
      "Paste Chapter 7 text here.",
      "Paste Chapter 8 text here.",
      "Paste Chapter 9 text here.",
      "Paste Chapter 10 text here.",
      "Paste Chapter 11 text here.",
      "Paste Chapter 12 text here.",
      "Paste Chapter 13 text here.",
      "Paste Chapter 14 text here.",
      "Paste Chapter 15 text here.",
      "Paste Chapter 16 text here.",
      "Paste Chapter 17 text here.",
      "Paste Chapter 18 text here.",
      "Paste Chapter 19 text here.",
      "Paste Chapter 20 text here.",
      "Paste Chapter 21 text here.",
      "Paste Chapter 22 text here.",
      "Paste Chapter 23 text here.",
      "Paste Chapter 24 text here.",
      "Paste Chapter 25 text here.",
      "Paste Chapter 26 text here.",
      "Paste Chapter 27 text here.",
      "Paste Chapter 28 text here.",
      "Paste Chapter 29 text here.",
      "Paste Chapter 30 text here."
    ];

    /* This script automatically generates the chapters on the page */
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('main-title').innerText = bookTitle;
      document.getElementById('sub-title').innerText = "By " + authorName;
      document.getElementById('footer-info').innerText = `© 2026 ${authorName} · ${bookTitle}`;

      const container = document.getElementById('chapter-container');
      const romanNumerals = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII", "XIII", "XIV", "XV", "XVI", "XVII", "XVIII", "XIX", "XX", "XXI", "XXII", "XXIII", "XXIV", "XXV", "XXVI", "XXVII", "XXVIII", "XXIX", "XXX"];

      chapters.forEach((text, index) => {
        const details = document.createElement('details');
        details.innerHTML = `
          <summary>
            <span class="chapter-num">${romanNumerals[index]}</span>
            <span class="chapter-title">Chapter ${index + 1}</span>
            <span class="chapter-arrow">›</span>
          </summary>
          <div class="chapter-body">
            <p>${text.replace(/\n/g, '</p><p>')}</p>
          </div>
        `;
        container.appendChild(details);
      });
    });
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--text:#c8c4bc;--text-dim:#6e6b65;--text-bright:#e8e4dc;--accent:#a08060;--border:#1e1e1c}
    
    html,body{
      background:var(--bg);
      color:var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 24px; /* Slightly adjusted size */
      line-height: 1.7;
      min-height: 100vh;
    }

    body{padding:env(safe-area-inset-top) 20px 0}
    header{text-align:center;padding:80px 20px 60px;border-bottom:1px solid var(--border)}
    .book-label{font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
    h1{font-weight:400;font-size:clamp(36px,8vw,64px);color:var(--text-bright);line-height:1.1}
    .subtitle{font-style:italic;font-size:20px;color:var(--text-dim);margin-top:14px}
    .toc-label{font-family:'Tenor Sans',sans-serif;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-dim);text-align:center;padding:40px 0 20px}
    .chapters{max-width:700px;margin:0 auto;padding-bottom:100px}
    
    details{border-bottom:1px solid var(--border)}
    summary{display:flex;align-items:baseline;gap:15px;padding:22px 5px;cursor:pointer;list-style:none;user-select:none}
    
    .chapter-num{font-family:'Tenor Sans',sans-serif;font-size:12px;color:var(--text-dim);min-width:40px}
    .chapter-title{font-size:24px;flex:1}
    .chapter-arrow{font-size:14px;color:var(--text-dim);transition:transform 0.2s}
    
    details[open] summary .chapter-title{color:var(--text-bright)}
    details[open] .chapter-arrow{transform:rotate(90deg);color:var(--accent)}
    .chapter-body{padding:15px 5px 40px 55px;animation:fadeIn 0.3s ease}
    .chapter-body p{margin-bottom:1.4em}
    
    @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    footer{text-align:center;padding:60px 40px;font-family:'Tenor Sans',sans-serif;font-size:10px;color:var(--text-dim);border-top:1px solid var(--border)}
    @media (max-width: 500px) { .chapter-body { padding-left: 10px; } }
  </style>
</head>
<body>

<header>
  <p class="book-label">A Novel</p>
  <h1 id="main-title">Loading...</h1>
  <p id="sub-title" class="subtitle"></p>
</header>

<p class="toc-label">Contents</p>

<main id="chapter-container" class="chapters">
  </main>

<footer id="footer-info"></footer>

</body>
</html>
