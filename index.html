<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Reader</title>
  <!--
    Google Fonts loaded with crossorigin + fallback stack.
    If the WebView blocks it, the CSS font-family stacks below
    fall back gracefully to system serif fonts.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Tenor+Sans&family=Lora:ital,wght@0,400;1,400&family=Merriweather:ital,wght@0,300;1,300&family=Crimson+Text:ital,wght@0,400;1,400&family=Source+Serif+4:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #080808;
      --text: #c8c4bc;
      --accent: #a08060;
      --border: rgba(255, 255, 255, 0.1);
      --panel: rgba(25, 25, 25, 0.9);
      --font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
      --font-size: 21px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-family);
      font-size: var(--font-size);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      position: fixed;
      top: env(safe-area-inset-top, 10px);
      left: 0;
      right: 0;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }

    .btn-group,
    .controls-group {
      display: flex;
      gap: 8px;
      pointer-events: auto;
      align-items: center;
    }

    .nav-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: transparent;
      width: 44px;
      height: 38px;
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .nav-btn:active { background: var(--accent); }

    /*
      Wrapper acts as the visual "pill" box.
      We size it, clip it, and let the native <select> fill it completely
      so the entire box is a tap target — important for small WebViews.
    */
    .selector-wrapper {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      backdrop-filter: blur(10px);
      height: 38px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: stretch;
    }

    .page-wrapper      { width: 58px; }
    .book-wrapper      { width: 80px; }
    .font-size-wrapper { width: 56px; }
    .font-type-wrapper { width: 80px; }

    /*
      Key WebView fixes:
      - NO appearance:auto / appearance:none toggle tricks — just leave default
      - Set explicit color on both select AND option
      - Use a label overlay so the box always shows text even if the
        native select renders its selected-value area as blank
      - Keep the <select> fully covering the wrapper for tap area
    */
    .nav-select {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.011; /* near-invisible but fully tappable */
      cursor: pointer;
      font-size: 16px; /* prevents iOS zoom on focus */
      border: none;
      background: transparent;
      color: var(--text);
      z-index: 2;
    }

    /* The visible label that we update manually via JS */
    .select-label {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-family: 'Tenor Sans', Georgia, sans-serif;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      z-index: 1;
      text-align: center;
      padding: 0 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #reader-view {
      flex: 1;
      overflow-y: auto;
      padding: calc(env(safe-area-inset-top) + 75px) 25px 80px;
      display: flex;
      justify-content: center;
      scroll-behavior: smooth;
    }

    #content-container {
      max-width: 650px;
      width: 100%;
      font-family: var(--font-family);
      font-size: var(--font-size);
      animation: fadeIn 0.4s ease;
    }

    p { margin-bottom: 1.5em; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    #reader-view::-webkit-scrollbar { display: none; }
    #reader-view { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="btn-group">
    <button class="nav-btn" onclick="prev()" aria-label="Previous"></button>
    <button class="nav-btn" onclick="next()" aria-label="Next"></button>
  </div>

  <div class="controls-group">

    <!-- Font Type -->
    <div class="selector-wrapper font-type-wrapper">
      <span class="select-label" id="font-label">Garamond</span>
      <select id="font-select" class="nav-select" aria-label="Font type"
              onchange="setFont(this.value, this.options[this.selectedIndex].text)">
        <option value="'EB Garamond',Georgia,'Times New Roman',serif">Garamond</option>
        <option value="'Lora',Georgia,'Times New Roman',serif">Lora</option>
        <option value="'Merriweather','Times New Roman',serif">Merriwr.</option>
        <option value="'Crimson Text',Georgia,serif">Crimson</option>
        <option value="'Source Serif 4','Times New Roman',serif">Src Serif</option>
      </select>
    </div>

    <!-- Font Size -->
    <div class="selector-wrapper font-size-wrapper">
      <span class="select-label" id="size-label">21</span>
      <select id="size-select" class="nav-select" aria-label="Font size"
              onchange="setSize(this.value, this.options[this.selectedIndex].text)">
        <option value="16px">16</option>
        <option value="18px">18</option>
        <option value="21px" selected>21</option>
        <option value="24px">24</option>
        <option value="28px">28</option>
      </select>
    </div>

    <!-- Book -->
    <div class="selector-wrapper book-wrapper">
      <span class="select-label" id="book-label">Book 1</span>
      <select id="book-select" class="nav-select" aria-label="Select book"
              onchange="switchBook(this.value, this.options[this.selectedIndex].text)">
        <option value="book.txt">Book 1</option>
        <!-- Add more books: <option value="book2.txt">Book 2</option> -->
      </select>
    </div>

    <!-- Page Number -->
    <div class="selector-wrapper page-wrapper">
      <span class="select-label" id="page-label">1</span>
      <select id="page-select" class="nav-select" aria-label="Page number"
              onchange="jumpToPage(this.value)"></select>
    </div>

  </div>
</div>

<main id="reader-view">
  <div id="content-container"></div>
</main>

<script>
  let pages = [];
  let currentIndex = 0;

  // ── Book loading ──────────────────────────────────────────────────────────

  async function loadBook(filename) {
    filename = filename || 'book.txt';
    try {
      const response = await fetch(filename);
      if (!response.ok) throw new Error('Could not load ' + filename);
      const text = await response.text();
      paginate(text);
    } catch (err) {
      document.getElementById('content-container').innerHTML =
        '<p style="color:#a08060;">Error: could not load ' + filename +
        ' — make sure it is in the same folder as index.html.</p>';
      console.error(err);
    }
  }

  function switchBook(filename, label) {
    document.getElementById('book-label').textContent = label;
    // Reset to page 1 when switching books
    window.history.replaceState(null, null, '#1');
    loadBook(filename);
  }

  // ── Pagination ────────────────────────────────────────────────────────────

  function paginate(fullText) {
    pages = [];
    const totalChars = fullText.length;
    const chunkTarget = Math.ceil(totalChars / 100);
    let start = 0;

    while (start < totalChars) {
      let end = start + chunkTarget;
      if (end < totalChars) {
        const searchRange = fullText.slice(end, end + 1000);
        const match = searchRange.match(/[.!?]/);
        if (match) {
          end = end + match.index + 1;
        } else {
          const nextSpace = fullText.indexOf(' ', end);
          if (nextSpace !== -1) end = nextSpace;
        }
      }
      pages.push(fullText.slice(start, end).trim());
      start = end;
    }

    buildPageDropdown();
    loadFromHash();
  }

  // ── Page dropdown — built carefully for WebView compatibility ─────────────

  function buildPageDropdown() {
    const select = document.getElementById('page-select');

    // Remove old options one by one (safer than innerHTML = '' in some WebViews)
    while (select.options.length > 0) select.remove(0);

    pages.forEach((_, i) => {
      const opt = new Option(String(i + 1), String(i));
      select.add(opt);
    });

    // Force WebView to acknowledge the new options list
    select.selectedIndex = 0;
  }

  // ── Rendering ─────────────────────────────────────────────────────────────

  function loadFromHash() {
    const hash = window.location.hash.replace('#', '');
    const pageNum = parseInt(hash);
    currentIndex = (!isNaN(pageNum) && pageNum > 0 && pageNum <= pages.length)
      ? pageNum - 1 : 0;
    render();
  }

  function render() {
    const container = document.getElementById('content-container');
    const select    = document.getElementById('page-select');
    const label     = document.getElementById('page-label');

    container.innerHTML = pages[currentIndex]
      .split(/\n\s*\n/)
      .filter(p => p.trim() !== '')
      .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
      .join('');

    // Sync the native select value
    select.value = String(currentIndex);
    // Update the visible label overlay
    label.textContent = String(currentIndex + 1);

    document.getElementById('reader-view').scrollTop = 0;
    window.history.replaceState(null, null, `#${currentIndex + 1}`);
  }

  function jumpToPage(val) {
    currentIndex = parseInt(val);
    document.getElementById('page-label').textContent = String(currentIndex + 1);
    render();
  }

  function next() {
    if (currentIndex < pages.length - 1) { currentIndex++; render(); }
  }
  function prev() {
    if (currentIndex > 0) { currentIndex--; render(); }
  }

  // ── Font / size controls ──────────────────────────────────────────────────

  function setFont(value, label) {
    document.documentElement.style.setProperty('--font-family', value);
    document.getElementById('content-container').style.fontFamily = value;
    document.getElementById('font-label').textContent = label;
  }

  function setSize(value, label) {
    document.documentElement.style.setProperty('--font-size', value);
    document.getElementById('content-container').style.fontSize = value;
    document.getElementById('size-label').textContent = label;
  }

  // ── Keyboard nav ──────────────────────────────────────────────────────────

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft')  prev();
  });

  window.addEventListener('hashchange', loadFromHash);

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadBook('book.txt');
</script>

</body>
</html>
