<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Tenor+Sans&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #080808;
      --text: #c8c4bc;
      --accent: #a08060;
      --border: rgba(255, 255, 255, 0.1);
      --panel: rgba(25, 25, 25, 0.9);
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 21px;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation Bar Container */
    .top-nav {
      position: fixed;
      top: env(safe-area-inset-top, 10px);
      left: 0;
      right: 0;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none; /* Allows scrolling through the gaps */
    }

    /* Navigation Buttons (Top Left) */
    .btn-group {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .nav-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-size: 18px;
      transition: 0.2s;
    }

    .nav-btn:active { background: var(--accent); color: white; }

    /* Page Counter (Top Right) */
    #page-counter {
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Tenor Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 8px 12px;
      border-radius: 4px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      user-select: none;
    }

    #page-counter:hover { border-color: var(--accent); }

    /* Main Reader Area */
    #reader-view {
      flex: 1;
      overflow-y: auto;
      padding: calc(env(safe-area-inset-top) + 70px) 25px 60px;
      display: flex;
      justify-content: center;
      scroll-behavior: smooth;
    }

    #content-container {
      max-width: 650px;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }

    p { margin-bottom: 1.5em; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Hide scrollbar */
    #reader-view::-webkit-scrollbar { display: none; }
    #reader-view { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="btn-group">
    <button class="nav-btn" onclick="prev()">‹</button>
    <button class="nav-btn" onclick="next()">›</button>
  </div>
  <div id="page-counter" onclick="jumpToPage()">PG 1 / 100</div>
</div>

<main id="reader-view">
  <div id="content-container"></div>
</main>

<script>
  /**
   * PASTE YOUR BOOK TEXT BETWEEN THE BACKTICKS BELOW
   */
  const fullBookText = `
    PASTE YOUR ENTIRE TEXT HERE...
  `;

  let pages = [];
  let currentIndex = 0;

  function paginate() {
    const totalChars = fullBookText.length;
    const chunkTarget = Math.ceil(totalChars / 100);
    let i = 0;

    while (i < totalChars) {
      let end = i + chunkTarget;
      if (end < totalChars) {
        const nextSpace = fullBookText.indexOf(' ', end);
        if (nextSpace !== -1 && (nextSpace - end) < 300) {
          end = nextSpace;
        }
      }
      pages.push(fullBookText.slice(i, end).trim());
      i = end;
    }
    loadFromHash();
  }

  function loadFromHash() {
    const hash = window.location.hash.replace('#', '');
    const pageNum = parseInt(hash);
    if (!isNaN(pageNum) && pageNum > 0 && pageNum <= pages.length) {
      currentIndex = pageNum - 1;
    } else {
      currentIndex = 0;
    }
    render();
  }

  function render() {
    const container = document.getElementById('content-container');
    const counter = document.getElementById('page-counter');
    
    container.innerHTML = pages[currentIndex]
      .split('\n')
      .filter(p => p.trim() !== '')
      .map(p => `<p>${p}</p>`)
      .join('');

    counter.innerText = `PG ${currentIndex + 1} / ${pages.length}`;
    document.getElementById('reader-view').scrollTop = 0;
    window.history.replaceState(null, null, `#${currentIndex + 1}`);
  }

  function jumpToPage() {
    const choice = prompt(`Enter page number (1 - ${pages.length}):`, currentIndex + 1);
    const pageNum = parseInt(choice);
    if (!isNaN(pageNum) && pageNum > 0 && pageNum <= pages.length) {
      currentIndex = pageNum - 1;
      render();
    }
  }

  function next() { if (currentIndex < pages.length - 1) { currentIndex++; render(); } }
  function prev() { if (currentIndex > 0) { currentIndex--; render(); } }

  document.addEventListener('keydown', e => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
  });

  window.addEventListener('hashchange', loadFromHash);
  paginate();
</script>

</body>
</html>
